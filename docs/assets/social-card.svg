<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c1422"/>
      <stop offset="1" stop-color="#11203a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="6" fill="url(#accent)"/>

  <!-- kicker -->
  <text x="80" y="92" fill="#34d399" font-size="20" font-weight="700" letter-spacing="3">OPEN-SOURCE  ·  CI-VERIFIED  ·  AI-OPTIONAL</text>

  <!-- title -->
  <text x="78" y="168" fill="#f6f8fb" font-size="76" font-weight="800" letter-spacing="-1">DevSecOps Capstone</text>
  <text x="80" y="214" fill="#9fb3c8" font-size="27" font-weight="400">Take an app from an empty repo &#8594; secured, observable, tested, deploy-ready.</text>

  <!-- pipeline -->
  <line x1="150" y1="320" x2="1050" y2="320" stroke="#2b3d5c" stroke-width="3"/>
  <g text-anchor="middle">
    <g>
      <circle cx="150" cy="320" r="13" fill="#0c1422" stroke="#34d399" stroke-width="3"/>
      <text x="150" y="372" fill="#e7edf5" font-size="21" font-weight="700">Scaffold</text>
      <text x="150" y="396" fill="#7d93ab" font-size="15">scaffold.py</text>
    </g>
    <g>
      <circle cx="330" cy="320" r="13" fill="#0c1422" stroke="#34d399" stroke-width="3"/>
      <text x="330" y="372" fill="#e7edf5" font-size="21" font-weight="700">Build</text>
      <text x="330" y="396" fill="#7d93ab" font-size="15">app + tests</text>
    </g>
    <g>
      <circle cx="510" cy="320" r="13" fill="#0c1422" stroke="#34d399" stroke-width="3"/>
      <text x="510" y="372" fill="#e7edf5" font-size="21" font-weight="700">Secure CI</text>
      <text x="510" y="396" fill="#7d93ab" font-size="15">shift-left</text>
    </g>
    <g>
      <circle cx="690" cy="320" r="13" fill="#0c1422" stroke="#34d399" stroke-width="3"/>
      <text x="690" y="372" fill="#e7edf5" font-size="21" font-weight="700">Observe</text>
      <text x="690" y="396" fill="#7d93ab" font-size="15">OTel + SLOs</text>
    </g>
    <g>
      <circle cx="870" cy="320" r="13" fill="#0c1422" stroke="#34d399" stroke-width="3"/>
      <text x="870" y="372" fill="#e7edf5" font-size="21" font-weight="700">IaC + Gov</text>
      <text x="870" y="396" fill="#7d93ab" font-size="15">Terraform/OPA</text>
    </g>
    <g>
      <circle cx="1050" cy="320" r="13" fill="#0c1422" stroke="#38bdf8" stroke-width="3"/>
      <text x="1050" y="372" fill="#e7edf5" font-size="21" font-weight="700">Ship</text>
      <text x="1050" y="396" fill="#7d93ab" font-size="15">deploy-ready</text>
    </g>
  </g>

  <!-- divider -->
  <line x1="80" y1="452" x2="1120" y2="452" stroke="#1d2c46" stroke-width="2"/>

  <!-- six test types -->
  <text x="80" y="500" fill="#9fb3c8" font-size="17" font-weight="700" letter-spacing="2">SIX TEST TYPES, GATED IN CI</text>
  <g font-size="18" font-weight="600" fill="#cdd9e8" text-anchor="middle">
    <rect x="80"  y="515" width="150" height="42" rx="21" fill="#16243a" stroke="#2b3d5c"/>
    <text x="155" y="542">Unit</text>
    <rect x="245" y="515" width="165" height="42" rx="21" fill="#16243a" stroke="#2b3d5c"/>
    <text x="327" y="542">Integration</text>
    <rect x="425" y="515" width="120" height="42" rx="21" fill="#16243a" stroke="#2b3d5c"/>
    <text x="485" y="542">E2E</text>
    <rect x="560" y="515" width="150" height="42" rx="21" fill="#16243a" stroke="#2b3d5c"/>
    <text x="635" y="542">Security</text>
    <rect x="725" y="515" width="120" height="42" rx="21" fill="#16243a" stroke="#2b3d5c"/>
    <text x="785" y="542">Load</text>
    <rect x="860" y="515" width="120" height="42" rx="21" fill="#16243a" stroke="#2b3d5c"/>
    <text x="920" y="542">Pen</text>
  </g>

  <!-- footer -->
  <text x="80" y="618" fill="#7d93ab" font-size="19">FastAPI &#183; React &#183; Postgres  &#183;  Terraform + OPA  &#183;  OpenTelemetry  &#183;  SOC 2 / ISO 27001 / CIS</text>
  <text x="80" y="648" fill="#34d399" font-size="19" font-weight="700">github.com/jaricsng/devsecops-capstone-lab</text>

  <!-- CI passing badge -->
  <rect x="956" y="610" width="164" height="44" rx="22" fill="#0e2a1f" stroke="#34d399" stroke-width="1.5"/>
  <circle cx="984" cy="632" r="7" fill="#34d399"/>
  <text x="1000" y="638" fill="#34d399" font-size="18" font-weight="700">CI passing</text>
</svg>
